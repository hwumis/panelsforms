<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panels Quality Forms</title>

<style>

:root{
--header-bg:#1b2a36;
--page-bg:#f4f4f4;
--button-bg:#3a6ea5;
--button-hover:#2f5b89;
--home-bg:#d32f2f;
--home-hover:#b71c1c;
}

*{
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{
margin:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
background:var(--page-bg);
overflow:hidden;
}

body{
display:flex;
flex-direction:column;
}

.header{
display:grid;
grid-template-columns:1fr auto 1fr;
align-items:center;
background:var(--header-bg);
color:white;
padding:20px 32px;
min-height:130px;
}

.clock-wrap{
justify-self:start;
line-height:1.1;
}

.clock-date{
font-size:24px;
font-weight:600;
}

.clock-time{
font-size:36px;
font-weight:700;
margin-top:4px;
}

.logo-wrap{
justify-self:center;
}

.logo{
height:100px;
width:auto;
}

.title{
justify-self:end;
font-size:52px;
font-weight:700;
white-space:nowrap;
}

.menu-view{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
padding:30px;
overflow:auto;
}

.subtext{
font-size:28px;
margin-bottom:30px;
}

.button-container{
width:min(1100px,90%);
display:grid;
gap:22px;
}

.menu-button{
width:100%;
min-height:100px;
font-size:38px;
font-weight:700;
border:none;
border-radius:14px;
background:var(--button-bg);
color:white;
cursor:pointer;
}

.menu-button:hover{
background:var(--button-hover);
}

.form-view{
display:none;
flex-direction:column;
flex:1;
padding:16px;
gap:14px;
}

.form-toolbar{
display:flex;
justify-content:space-between;
align-items:center;
}

.home-button{
font-size:28px;
font-weight:700;
padding:16px 28px;
border:none;
border-radius:12px;
background:var(--home-bg);
color:white;
cursor:pointer;
}

.home-button:hover{
background:var(--home-hover);
}

.status-text{
font-size:22px;
}

.iframe-wrap{
flex:1;
border-radius:12px;
overflow:hidden;
background:white;
}

.form-frame{
width:100%;
height:100%;
border:none;
}

</style>
</head>

<body>

<div class="header">

<div class="clock-wrap">
<div id="clockDate" class="clock-date"></div>
<div id="clockTime" class="clock-time"></div>
</div>

<div class="logo-wrap">
<img src="logo3.png" class="logo">
</div>

<div class="title">Panels Quality Forms</div>

</div>

<div id="menuView" class="menu-view">

<div class="subtext">Tap the form below to begin</div>

<div class="button-container">

<button class="menu-button" data-form="https://forms.office.com/r/9CZw0TZKFN">Forms Link #1</button>
<button class="menu-button" data-form="https://forms.office.com/r/9CZw0TZKFN">Forms Link #2</button>
<button class="menu-button" data-form="https://forms.office.com/r/9CZw0TZKFN">Forms Link #3</button>
<button class="menu-button" data-form="https://forms.office.com/r/9CZw0TZKFN">Forms Link #4</button>
<button class="menu-button" data-form="https://forms.office.com/r/9CZw0TZKFN">Forms Link #5</button>
<button class="menu-button" data-form="https://forms.office.com/r/9CZw0TZKFN">Forms Link #6</button>

</div>

</div>

<div id="formView" class="form-view">

<div class="form-toolbar">
<button id="homeButton" class="home-button">Return to Menu</button>
<div class="status-text">Returns to menu after inactivity</div>
</div>

<div class="iframe-wrap">
<iframe id="formFrame" class="form-frame"></iframe>
</div>

</div>

<script>

const menuView=document.getElementById("menuView");
const formView=document.getElementById("formView");
const formFrame=document.getElementById("formFrame");
const homeButton=document.getElementById("homeButton");
const buttons=document.querySelectorAll(".menu-button");

const RETURN_TO_MENU_MS=120000;

let inactivityTimer=null;

function showMenu(){
clearTimeout(inactivityTimer);
formFrame.src="about:blank";
formView.style.display="none";
menuView.style.display="flex";
}

function showForm(url){
menuView.style.display="none";
formView.style.display="flex";
formFrame.src=url;
resetTimer();
}

function resetTimer(){
clearTimeout(inactivityTimer);
inactivityTimer=setTimeout(showMenu,RETURN_TO_MENU_MS);
}

["pointerdown","pointermove","touchstart","keydown"].forEach(evt=>{
document.addEventListener(evt,()=>{
if(formView.style.display==="flex"){
resetTimer();
}
},{passive:true});
});

homeButton.addEventListener("click",showMenu);

buttons.forEach(btn=>{
btn.addEventListener("click",()=>{
showForm(btn.dataset.form);
});
});

function updateClock(){
const now=new Date();

const dateText=now.toLocaleDateString(undefined,{
weekday:"short",
year:"numeric",
month:"short",
day:"numeric"
});

const timeText=now.toLocaleTimeString(undefined,{
hour:"numeric",
minute:"2-digit"
});

document.getElementById("clockDate").textContent=dateText;
document.getElementById("clockTime").textContent=timeText;
}

updateClock();
setInterval(updateClock,1000);

showMenu();

</script>

</body>
</html>
